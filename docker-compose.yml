services:
  # Environnement de dev : Vite avec hot reload.
  # Lancement : docker compose up dev
  dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

  # Image de production servie par nginx.
  # Lancement : docker compose up --build prod
  prod:
    build:
      context: .
      target: production
    ports:
      - "9000:80"
    restart: unless-stopped

volumes:
  node_modules:
